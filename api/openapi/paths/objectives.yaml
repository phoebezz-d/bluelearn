# Path items for /objectives. Referenced from ../openapi.yaml.
/objectives:
  get:
    tags: [objectives]
    summary: List published objectives
    operationId: listObjectives
    responses:
      "200":
        description: Published objectives
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                objectives:
                  type: array
                  items:
                    $ref: "../components/schemas/objectives/ObjectiveListItem.yaml"
              required: [objectives]
  post:
    tags: [objectives]
    summary: Create a draft objective
    description: >
      Creates the shell + revision 1, seeding the closure of the target
      guides as the initial node set. Returns the draft revision id for routing
      to the editor.
    operationId: createObjective
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/objectives/CreateObjectiveRequest.yaml"
    responses:
      "201":
        description: Created; draft revision id
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                revision_id:
                  $ref: "../components/schemas/common/Uuid.yaml"
              required: [revision_id]
      "400":
        $ref: "../components/responses/_shared.yaml#/BadRequest"
      "401":
        $ref: "../components/responses/_shared.yaml#/Unauthorized"
      "403":
        $ref: "../components/responses/_shared.yaml#/Forbidden"

/objectives/{slug}:
  parameters:
    - name: slug
      in: path
      required: true
      schema:
        type: string
      example: backend-engineer
  get:
    tags: [objectives]
    summary: Open an objective
    description: Resolves the live current revision and returns its full snapshot.
    operationId: getObjective
    responses:
      "200":
        description: The objective + its current snapshot
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                objective:
                  $ref: "../components/schemas/objectives/Objective.yaml"
                snapshot:
                  $ref: "../components/schemas/objectives/ObjectiveSnapshot.yaml"
              required: [objective, snapshot]
      "404":
        $ref: "../components/responses/_shared.yaml#/NotFound"
  delete:
    tags: [objectives]
    summary: Archive an objective
    operationId: archiveObjective
    security:
      - bearerAuth: []
    responses:
      "200":
        description: The archived objective
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                objective:
                  type: object
                  additionalProperties: false
                  properties:
                    id:
                      $ref: "../components/schemas/common/Uuid.yaml"
                    slug:
                      type: string
                      example: backend-engineer
                    status:
                      $ref: "../components/schemas/common/NodeStatus.yaml"
                  required: [id, slug, status]
              required: [objective]
            example:
              objective:
                id: 00000000-0000-0000-0000-000000000000
                slug: backend-engineer
                status: archived
      "401":
        $ref: "../components/responses/_shared.yaml#/Unauthorized"
      "403":
        $ref: "../components/responses/_shared.yaml#/Forbidden"
      "404":
        $ref: "../components/responses/_shared.yaml#/NotFound"

/objectives/{slug}/revisions:
  parameters:
    - name: slug
      in: path
      required: true
      schema:
        type: string
      example: backend-engineer
  get:
    tags: [objectives]
    summary: Revision history for this objective
    operationId: listObjectiveRevisions
    responses:
      "200":
        description: Revisions, newest first
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                revisions:
                  type: array
                  items:
                    $ref: "../components/schemas/objective-revisions/ObjectiveRevisionListItem.yaml"
              required: [revisions]
      "404":
        $ref: "../components/responses/_shared.yaml#/NotFound"
  post:
    tags: [objectives]
    summary: Start a new draft revision
    operationId: createObjectiveRevision
    security:
      - bearerAuth: []
    responses:
      "201":
        description: Created; draft revision id
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                revision_id:
                  $ref: "../components/schemas/common/Uuid.yaml"
              required: [revision_id]
      "401":
        $ref: "../components/responses/_shared.yaml#/Unauthorized"
      "403":
        $ref: "../components/responses/_shared.yaml#/Forbidden"
      "404":
        $ref: "../components/responses/_shared.yaml#/NotFound"
