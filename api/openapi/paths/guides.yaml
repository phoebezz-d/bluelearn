# Path items for /guides. Referenced from ../openapi.yaml.
/guides:
  get:
    tags: [guides]
    summary: List published topics
    description: Published guide bases, alphabetical. RLS hides drafts from non-authors.
    operationId: listGuides
    responses:
      '200':
        description: Published topics
        content:
          application/json:
            schema:
              type: object
              properties:
                topics:
                  type: array
                  items:
                    $ref: '../components/schemas/guides/TopicListItem.yaml'
              required: [topics]
  post:
    tags: [guides]
    summary: Create a topic
    description: >
      Creates guide_base + first guide + draft revision in one transaction
      (create_topic RPC). Returns the draft revision id for routing to the editor.
    operationId: createTopic
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/guides/CreateTopicRequest.yaml'
    responses:
      '201':
        description: Created; draft revision id + frozen slug
        content:
          application/json:
            schema:
              type: object
              properties:
                revision_id:
                  $ref: '../components/schemas/common/Uuid.yaml'
                slug:
                  type: string
                  example: calculus
              required: [revision_id, slug]
      '400':
        $ref: '../components/responses/_shared.yaml#/BadRequest'
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
      '409':
        $ref: '../components/responses/_shared.yaml#/Conflict'

/guides/{slug}:
  parameters:
    - name: slug
      in: path
      required: true
      schema:
        type: string
      example: calculus
  get:
    tags: [guides]
    summary: Get a topic by slug
    description: Canonical content of the topic plus its subject tags.
    operationId: getTopic
    responses:
      '200':
        description: Topic content + subject tags
        content:
          application/json:
            schema:
              type: object
              properties:
                topic:
                  $ref: '../components/schemas/guides/Topic.yaml'
                subjects:
                  type: array
                  items:
                    $ref: '../components/schemas/subjects/SubjectTag.yaml'
              required: [topic, subjects]
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'
  delete:
    tags: [guides]
    summary: Archive a topic
    description: Moderator/admin only (RLS). A non-permitted caller matches zero rows (404).
    operationId: archiveTopic
    security:
      - bearerAuth: []
    responses:
      '200':
        description: The archived topic
        content:
          application/json:
            schema:
              type: object
              properties:
                topic:
                  type: object
                  properties:
                    id:
                      $ref: '../components/schemas/common/Uuid.yaml'
                    slug:
                      type: string
                      example: calculus
                    status:
                      $ref: '../components/schemas/common/NodeStatus.yaml'
                  required: [id, slug, status]
              required: [topic]
      '401':
        $ref: '../components/responses/_shared.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses/_shared.yaml#/NotFound'

/guides/{slug}/walkthrough:
  parameters:
    - name: slug
      in: path
      required: true
      schema:
        type: string
      example: calculus
  get:
    tags: [guides]
    summary: Topic walkthrough (transitive prerequisite DAG)
    description: >
      Materializes the target's transitive prerequisite closure with
      longest-path depths, plus the prerequisite edges among the nodes.
    operationId: getWalkthrough
    responses:
      '200':
        description: The walkthrough graph
        content:
          application/json:
            schema:
              $ref: '../components/schemas/guides/Walkthrough.yaml'
      '501':
        $ref: '../components/responses/_shared.yaml#/NotImplemented'

/guides/{slug}/todos:
  parameters:
    - name: slug
      in: path
      required: true
      schema:
        type: string
      example: calculus
  post:
    tags: [guides]
    summary: Declare a TODO prerequisite
    description: Declares a missing prerequisite topic that has no guide base yet.
    operationId: declareTodo
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              title:
                type: string
                example: Trigonometry
            required: [title]
    responses:
      '201':
        description: The created TODO prerequisite
        content:
          application/json:
            schema:
              type: object
              properties:
                todo:
                  $ref: '../components/schemas/guides/Todo.yaml'
              required: [todo]
      '501':
        $ref: '../components/responses/_shared.yaml#/NotImplemented'

/guides/{slug}/variants:
  parameters:
    - name: slug
      in: path
      required: true
      schema:
        type: string
      example: calculus
  get:
    tags: [guides]
    summary: List variants under a topic
    description: The methods (practice topic) or alternatives (theory topic) under this topic.
    operationId: listTopicVariants
    responses:
      '200':
        description: Variants under the topic
        content:
          application/json:
            schema:
              type: object
              properties:
                variants:
                  type: array
                  items:
                    $ref: '../components/schemas/variants/VariantListItem.yaml'
              required: [variants]
      '501':
        $ref: '../components/responses/_shared.yaml#/NotImplemented'
  post:
    tags: [guides]
    summary: Add a variant under a topic
    description: >
      Creates a draft guide + first revision under the topic (create_variant
      RPC). Returns the draft revision id.
    operationId: addTopicVariant
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/variants/CreateVariantRequest.yaml'
    responses:
      '201':
        description: Created; draft revision id
        content:
          application/json:
            schema:
              type: object
              properties:
                revision_id:
                  $ref: '../components/schemas/common/Uuid.yaml'
              required: [revision_id]
      '501':
        $ref: '../components/responses/_shared.yaml#/NotImplemented'
