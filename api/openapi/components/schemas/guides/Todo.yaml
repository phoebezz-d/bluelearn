type: object
description: A declared missing prerequisite topic (no guide base exists yet).
properties:
  id:
    $ref: '../common/Uuid.yaml'
  guide_base_id:
    $ref: '../common/Uuid.yaml'
  guide_slug:
    type: string
    example: calculus
  guide_title:
    type: string
    example: Calculus
  title:
    type: string
    example: Need a Trigonometry prerequisite
  status:
    type: string
    enum: [open, resolved]
    example: open
  created_at:
    $ref: '../common/Timestamp.yaml'
required: [id, guide_base_id, title, status]
