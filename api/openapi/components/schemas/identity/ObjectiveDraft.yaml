type: object
additionalProperties: false
description: >
  One of the caller's in-progress objective draft revisions. Drafts never
  surface in the public objective listings (those key on the shell's published
  current_revision_id), so this is the only way back into one.
properties:
  revision_id:
    description: The draft revision. The objective editor route takes this directly.
    $ref: "../common/Uuid.yaml"
  objective_id:
    description: The objective the revision belongs to.
    $ref: "../common/Uuid.yaml"
  title:
    type: string
    example: Backend Engineer
  objective_slug:
    description: The objective's public slug, or null while it has no published revision yet.
    type: [string, "null"]
  created_at:
    $ref: "../common/Timestamp.yaml"
  updated_at:
    $ref: "../common/Timestamp.yaml"
required:
  [revision_id, objective_id, title, objective_slug, created_at, updated_at]
