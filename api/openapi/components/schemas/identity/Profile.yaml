type: object
description: The caller's own profile row.
properties:
  id:
    $ref: '../common/Uuid.yaml'
  username:
    type: string
    example: tony
  display_name:
    type: [string, 'null']
    example: Tony Lam
  bio:
    type: [string, 'null']
    example: Learning math
  is_suspended:
    type: boolean
    example: false
  created_at:
    $ref: '../common/Timestamp.yaml'
  updated_at:
    $ref: '../common/Timestamp.yaml'
required: [id, username]
