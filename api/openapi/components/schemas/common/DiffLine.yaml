type: object
description: >
  One row of a rendered field diff, for split-view rendering. `type` tells
  the frontend which column the line belongs in; `text` is the line content
  without the unified-diff prefix character.
properties:
  type:
    type: string
    enum: [unchanged, added, removed]
    description: >
      "unchanged" = line present on both sides (render in both columns);
      "added" = line only in `to` (render in the right column only);
      "removed" = line only in `from` (render in the left column only).
  text:
    type: string
    description: The line content without the leading " " / "-" / "+" prefix.
required: [type, text]
