type: object
additionalProperties: false
description: Rendered diff for a single versioned field.
properties:
  changed:
    type: boolean
    example: true
  diff:
    type: [string, "null"]
    description: >
      Unified-diff string when changed; null when unchanged. Lines starting
      with " " are unchanged, "-" only in `from`, "+" only in `to`. Kept for
      clients that already parse unified-diff; split-view renderers should
      prefer `lines`.
  lines:
    type: [array, "null"]
    description: >
      Structured per-line tokens when changed; null when unchanged. Each
      entry has a `type` of "unchanged", "added", or "removed" and the line
      `text` without the unified-diff prefix. Primary output for split-view
      renderers -- consume this instead of re-parsing `diff`.
    items:
      $ref: "./DiffLine.yaml"
required: [changed]
